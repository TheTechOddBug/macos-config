config-version = 2

# No startup hooks — SketchyBar and JankyBorders removed
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4", "5"]

[workspace-to-monitor-force-assignment]
    1 = 'secondary'  # external — code
    2 = 'secondary'  # external — web
    3 = 'secondary'  # external — infra
    4 = 'built-in'   # built-in — comms
    5 = 'built-in'   # built-in — meetings

[gaps]
    inner.horizontal = 6
    inner.vertical   = 6
    outer.left       = 6
    outer.right      = 6
    outer.bottom     = 6
    outer.top        = 6

[key-mapping]
    preset = 'qwerty'

[mode.main.binding]
    # Focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move window in direction
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Switch workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'

    # Move focused window to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'

    # Last workspace
    alt-tab = 'workspace-back-and-forth'

    # Fullscreen
    alt-f = 'fullscreen'


# ─── Auto-placement rules ────────────────────────────────────────────

# Workspace 1 — code (external)
[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 1']

# Workspace 2 — web (external)
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['move-node-to-workspace 2']

# Workspace 4 — comms (built-in)
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-name-regex-substring = 'WhatsApp'
run = ['move-node-to-workspace 4']

# Workspace 5 — meetings (built-in)
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)zoom'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 5']


# ─── Floating utilities (transient, popup-like windows) ──────────────

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.onmyway133.PastePal'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.shottr.Shottr'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SFSymbols'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
run = 'layout floating'
